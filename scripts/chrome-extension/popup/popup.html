<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orisup Scraper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <div>
          <h1>Orisup Scraper</h1>
          <span class="version">v1.0.0</span>
        </div>
      </div>
      <span class="badge">ALI</span>
    </header>

    <div class="popup-body">
      <!-- Status Section -->
      <div class="status-card" id="statusCard">
        <div class="status-icon" id="statusIcon">
          <div class="pulse-ring"></div>
          <div class="status-dot active"></div>
        </div>
        <div class="status-info">
          <span class="status-label" id="statusLabel">Ready</span>
          <span class="status-detail" id="statusDetail">Navigate to an AliExpress product</span>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="actions-grid">
        <button class="action-btn primary" id="scrapeBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          Scrape Product
        </button>
        <button class="action-btn" id="uploadBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Upload
        </button>
        <button class="action-btn" id="togglePanelBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
          Toggle Panel
        </button>
        <button class="action-btn" id="settingsBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          Settings
        </button>
      </div>

      <!-- Settings Panel (hidden by default) -->
      <div class="settings-panel" id="settingsPanel" style="display: none;">
        <div class="form-group">
          <label>Orisup Base URL</label>
          <input type="text" id="baseUrl" placeholder="http://localhost:5026" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>USD → BDT Rate</label>
            <input type="number" id="usdToBdt" value="120" />
          </div>
          <div class="form-group">
            <label>Markup</label>
            <input type="number" id="markup" value="2.0" step="0.1" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Default Stock</label>
            <input type="number" id="defaultStock" value="10" />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="defaultStatus">
              <option value="draft">Draft</option>
              <option value="active">Active</option>
            </select>
          </div>
        </div>
        <div class="form-group checkbox">
          <label>
            <input type="checkbox" id="autoScrape" />
            <span>Auto-scrape on page load</span>
          </label>
        </div>
        <div class="settings-actions">
          <button class="btn-secondary" id="cancelSettings">Cancel</button>
          <button class="btn-primary" id="saveSettings">Save</button>
        </div>
      </div>

      <!-- Recent Scrapes -->
      <div class="recent-section" id="recentSection">
        <h3>Recent Scrapes</h3>
        <div class="recent-list" id="recentList">
          <p class="empty-state">No products scraped yet</p>
        </div>
      </div>
    </div>

    <footer class="popup-footer">
      <a href="#" id="openSidePanel">Open Side Panel →</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
